run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  disable-all: true
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - typecheck
    - gosimple
    # - unused

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0